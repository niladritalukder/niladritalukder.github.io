bio: |
  Niladri Talukder, Ph.D., is a Mechanical Engineer specializing in functional nanomaterials for electrochemical and thermal energy systems. His work focuses on synthesis, advanced characterization, and performance evaluation of nanostructured materials for batteries, fuel cells, and thermal energy storage. His research aims to improve material stability, durability, and energy performance and has been published in leading scientific journals.

